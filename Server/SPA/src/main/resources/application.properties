spring.application.name=SPA
server.port=8080
server.servlet.context-path=/SPA

spring.datasource.url=jdbc:postgresql://localhost:5432/spadb
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseStatusExceptionResolver=error
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spa.price-chart.file-path=./uploads/price-chart.pdf
spa.profile-photo.directory-path=./uploads/profile-photos

